apiVersion: v1
kind: Namespace
metadata:
  name: watch-stress
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: watch-agent
  namespace: watch-stress
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: watch-agent
rules:
  - apiGroups: ["stresstest.kube-inflater.io"]
    resources: ["stressitems"]
    verbs: ["list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["configmaps", "secrets", "services", "namespaces", "pods", "serviceaccounts"]
    verbs: ["list", "watch"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["list", "watch"]
  - apiGroups: ["apps"]
    resources: ["statefulsets"]
    verbs: ["list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: watch-agent
subjects:
  - kind: ServiceAccount
    name: watch-agent
    namespace: watch-stress
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: watch-agent
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: watch-agent-results
  namespace: watch-stress
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: watch-agent-results
  namespace: watch-stress
subjects:
  - kind: ServiceAccount
    name: watch-agent
    namespace: watch-stress
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: watch-agent-results
